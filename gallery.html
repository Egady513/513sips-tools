<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | 513Sips - Elevated Mobile Bartending</title>
    <meta name="description" content="Browse photos from 513Sips events — craft cocktails, bar setups, weddings, and private celebrations throughout Cincinnati.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { DEFAULT: '#1a1a2e', light: '#2d2d4a', dark: '#12121f' },
                        cream: '#f5f2eb',
                        copper: { DEFAULT: '#b87333', light: '#d4915a' },
                        charcoal: '#2d3748'
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        :root { --navy: #1a1a2e; --navy-light: #2d2d4a; --navy-dark: #12121f; --cream: #f5f2eb; --copper: #b87333; --copper-light: #d4915a; --charcoal: #2d3748; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--cream); color: var(--charcoal); overflow-x: hidden; line-height: 1.6; }

        /* Nav — same as main site */
        .gallery-nav { position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(245, 242, 235, 0.95); backdrop-filter: blur(20px); border-radius: 9999px; padding: 0.75rem 1.5rem; border: 1px solid rgba(184, 115, 51, 0.2); box-shadow: 0 8px 32px rgba(26, 26, 46, 0.15); }
        .gallery-nav-inner { display: flex; align-items: center; gap: 1.5rem; }
        .gallery-nav-inner a { text-decoration: none; font-size: 0.85rem; font-weight: 500; color: var(--charcoal); transition: color 0.3s ease; }
        .gallery-nav-inner a:hover { color: var(--copper); }
        .gallery-nav-inner .back-link { display: flex; align-items: center; gap: 0.4rem; color: var(--copper); font-weight: 600; }

        /* Page Header */
        .gallery-header { padding: 8rem 2rem 3rem; text-align: center; }
        .gallery-header .tag { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; color: var(--copper); margin-bottom: 0.5rem; }
        .gallery-header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 600; color: var(--navy); margin-bottom: 1rem; }
        .gallery-header p { font-size: 1.1rem; color: var(--charcoal); max-width: 600px; margin: 0 auto; opacity: 0.8; }

        /* Filters */
        .gallery-filters { display: flex; justify-content: center; gap: 0.75rem; padding: 0 2rem 2rem; flex-wrap: wrap; }
        .filter-btn { padding: 0.6rem 1.5rem; background: white; border: 2px solid rgba(184, 115, 51, 0.2); border-radius: 9999px; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 500; color: var(--charcoal); cursor: pointer; transition: all 0.3s ease; }
        .filter-btn:hover, .filter-btn.active { background: var(--copper); border-color: var(--copper); color: white; }
        .filter-btn .count { font-size: 0.75rem; opacity: 0.7; margin-left: 0.3rem; }

        /* Masonry Grid */
        .gallery-grid { max-width: 1400px; margin: 0 auto; padding: 0 2rem 4rem; columns: 4; column-gap: 1rem; }
        .gallery-item { break-inside: avoid; margin-bottom: 1rem; border-radius: 16px; overflow: hidden; cursor: pointer; position: relative; transition: all 0.3s ease; }
        .gallery-item:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(184, 115, 51, 0.25); }
        .gallery-item img { width: 100%; display: block; transition: transform 0.4s ease; }
        .gallery-item:hover img { transform: scale(1.05); }
        .gallery-item .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(26,26,46,0.6) 0%, transparent 50%); opacity: 0; transition: opacity 0.3s ease; display: flex; align-items: flex-end; padding: 1rem; }
        .gallery-item:hover .overlay { opacity: 1; }
        .overlay-icon { width: 36px; height: 36px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }

        /* Photo Counter */
        .photo-counter { text-align: center; padding: 1rem 2rem 3rem; font-size: 0.9rem; color: var(--charcoal); opacity: 0.6; }

        /* Load More */
        .load-more-container { text-align: center; padding: 0 2rem 4rem; }
        .load-more-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 1rem 2.5rem; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; background: linear-gradient(135deg, var(--copper), var(--copper-light)); color: var(--navy-dark); border: none; border-radius: 50px; cursor: pointer; transition: all 0.4s ease; }
        .load-more-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(184, 115, 51, 0.4); }
        .load-more-btn.hidden { display: none; }

        /* Lightbox */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .lightbox.active { opacity: 1; pointer-events: all; }
        .lightbox-close { position: absolute; top: 2rem; right: 2rem; width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; z-index: 10000; }
        .lightbox-close:hover { background: var(--copper); transform: rotate(90deg); }
        .lightbox-content { max-width: 90%; max-height: 85vh; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: none; border-radius: 50%; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; }
        .lightbox-nav:hover { background: var(--copper); }
        .lightbox-prev { left: 2rem; }
        .lightbox-next { right: 2rem; }
        .lightbox-counter { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-size: 0.9rem; font-family: 'Montserrat', sans-serif; }

        /* CTA Bar */
        .cta-bar { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); padding: 4rem 2rem; text-align: center; }
        .cta-bar h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3rem); font-weight: 600; color: white; margin-bottom: 1rem; }
        .cta-bar p { color: rgba(255,255,255,0.8); max-width: 500px; margin: 0 auto 2rem; }
        .cta-bar .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 1rem 2.5rem; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; border-radius: 50px; background: linear-gradient(135deg, var(--copper), var(--copper-light)); color: var(--navy-dark); transition: all 0.4s ease; }
        .cta-bar .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(184, 115, 51, 0.5); }

        @media (max-width: 1024px) { .gallery-grid { columns: 3; } }
        @media (max-width: 768px) {
            .gallery-grid { columns: 2; }
            /* Mobile nav — hide extra links, keep just back arrow */
            .gallery-nav { top: 1rem; padding: 0.6rem 1rem; }
            .gallery-nav-inner { gap: 0; }
            .gallery-nav-inner a:not(.back-link) { display: none; }
            .gallery-nav-inner .back-link { font-size: 0.82rem; gap: 0.3rem; }
        }
        @media (max-width: 480px) { .gallery-grid { columns: 1; } }
    </style>
</head>
<body>

    <nav class="gallery-nav">
        <div class="gallery-nav-inner">
            <a href="index.html" class="back-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Back to Home
            </a>
            <a href="index.html#services">Services</a>
            <a href="index.html#contact">Contact</a>
        </div>
    </nav>

    <header class="gallery-header">
        <p class="tag">Our Work</p>
        <h1>Event Gallery</h1>
        <p>Browse through moments we've helped create at weddings, corporate events, and private celebrations throughout Cincinnati.</p>
    </header>

    <div class="gallery-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="cocktails">Cocktails</button>
        <button class="filter-btn" data-filter="events">Events</button>
        <button class="filter-btn" data-filter="bar">Bar Setup</button>
    </div>

    <div class="photo-counter" id="photo-counter"></div>

    <div class="gallery-grid" id="gallery-grid">
        <!-- Photos inserted by JS -->
    </div>

    <div class="load-more-container">
        <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">
            Load More Photos
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button class="lightbox-nav lightbox-next" id="lightbox-next">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <img class="lightbox-content" id="lightbox-content" src="" alt="">
        <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>

    <!-- CTA -->
    <section class="cta-bar">
        <h2>Love What You See?</h2>
        <p>Let's create unforgettable moments at your next event.</p>
        <a href="index.html#contact" class="btn">Book Your Event</a>
    </section>

    <script>
        // All gallery photos with categories
        const allPhotos = [
            { id: 'Eddie_Behnid_Bar_xq7t2e', cat: 'bar' },
            { id: 'Serving_Drinks_katc9z', cat: 'events' },
            { id: 'Eddie_Shaker_opubg0', cat: 'cocktails' },
            { id: 'IMG_8004_Afterlight_zxzwxb', cat: 'bar' },
            { id: 'IMG_0534_h0ktfq', cat: 'events' },
            { id: 'IMG_5556_o75fj1', cat: 'cocktails' },
            { id: 'IMG_0471_ktbldm', cat: 'cocktails' },
            { id: 'IMG_0450_fjd1ro', cat: 'cocktails' },
            { id: 'IMG_0446_twzt9v', cat: 'cocktails' },
            { id: 'IMG_0416_mga076', cat: 'bar' },
            { id: 'IMG_0412_azmhbz', cat: 'cocktails' },
            { id: 'IMG_8731_w1rihd', cat: 'events' },
            { id: 'IMG_8729_cccs6n', cat: 'events' },
            { id: 'IMG_5050_b61zbf', cat: 'cocktails' },
            { id: 'Drink_List_lhuk59', cat: 'bar' },
            { id: 'IMG_5049_qeh5yl', cat: 'cocktails' },
            { id: 'IMG_5044_rjsqdu', cat: 'cocktails' },
            { id: 'IMG_5043_pis2uf', cat: 'cocktails' },
            { id: 'Image_24_oqrne5', cat: 'events' },
            { id: 'Image_29_gvmria', cat: 'events' },
            { id: 'Image_22_qp8cb5', cat: 'events' },
            { id: 'BeFunky-design_1_la4yxh', cat: 'bar' },
            { id: 'IMG_4993_fql9nq', cat: 'cocktails' },
            { id: 'IMG_4973_fcoagy', cat: 'events' },
            { id: 'IMG_4995_zorqau', cat: 'cocktails' },
            { id: 'IMG_4948_negvxk', cat: 'cocktails' },
            { id: 'IMG_4889_zlvfgd', cat: 'events' },
            { id: 'IMG_4809_kjmxpv', cat: 'events' },
            { id: 'IMG_5013_kw9unz', cat: 'cocktails' },
            { id: 'IMG_3790_cnoupp', cat: 'events' },
            { id: 'PXL_20250920_192547382_fopq89', cat: 'events' },
            { id: 'PXL_20250920_192547382_crytl7', cat: 'events' },
            { id: 'Image_15_dnrfnm', cat: 'bar' },
            { id: 'IMG_4045_lwlybu', cat: 'events' },
            { id: 'IMG_1203_llotjl', cat: 'events' },
            { id: 'IMG_4210_zyylog', cat: 'cocktails' },
            { id: 'IMG_4931_cwk1nd', cat: 'cocktails' },
            { id: 'IMG_1195_bfjuz2', cat: 'events' },
            { id: 'IMG_0809_k4cb7k', cat: 'bar' },
            { id: 'Image_29_khmumj', cat: 'events' },
            { id: 'Rudolph_Sour_ubvbrz', cat: 'cocktails' },
            { id: 'IMG_5559_ub6rwa', cat: 'cocktails' },
            { id: 'IMG_5470_ejf4ga', cat: 'events' },
            { id: 'IMG_5363_d8gidp', cat: 'cocktails' },
            { id: 'IMG_0465_f9bwcs', cat: 'cocktails' },
            { id: 'IMG_0455_n4nnl4', cat: 'cocktails' },
            { id: 'IMG_0445_bgoske', cat: 'cocktails' },
            { id: 'IMG_4862_hzaq5e', cat: 'events' },
            { id: 'IMG_4930_cv0gzs', cat: 'cocktails' },
            { id: 'Image_27_lano01', cat: 'events' },
            { id: 'Image_26_j4kzj4', cat: 'events' },
            { id: 'Image_23_ett8tx', cat: 'events' },
            { id: 'Image_30_k81uqc', cat: 'events' },
            { id: 'Image_22_ebs7g6', cat: 'events' },
            { id: 'IMG_0637_riv7pu', cat: 'bar' },
            { id: 'Image_24_vsssax', cat: 'events' },
            { id: 'IMG_0350_fg18ru', cat: 'events' },
            { id: 'Image_25_inbreo', cat: 'events' },
            { id: 'Image_27_e1f5sl', cat: 'events' },
            { id: 'Image_25_i3sclr', cat: 'events' }
        ];

        const BATCH_SIZE = 20;
        let currentFilter = 'all';
        let loadedCount = 0;
        let filteredPhotos = [...allPhotos];
        let currentLightboxIndex = 0;
        let visiblePhotos = [];

        const grid = document.getElementById('gallery-grid');
        const counter = document.getElementById('photo-counter');
        const loadMoreBtn = document.getElementById('load-more-btn');

        function getPhotoUrl(id, size) {
            if (size === 'thumb') return `https://res.cloudinary.com/dkfypt2cb/image/upload/c_fill,w_600,q_auto,f_webp/${id}.jpg`;
            return `https://res.cloudinary.com/dkfypt2cb/image/upload/c_scale,w_1200,q_auto,f_webp/${id}.jpg`;
        }

        function renderPhotos() {
            grid.innerHTML = '';
            loadedCount = 0;
            filteredPhotos = currentFilter === 'all' ? [...allPhotos] : allPhotos.filter(p => p.cat === currentFilter);
            visiblePhotos = [];
            loadMore();
            updateCounter();
        }

        function loadMore() {
            const batch = filteredPhotos.slice(loadedCount, loadedCount + BATCH_SIZE);
            batch.forEach((photo, i) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.dataset.index = visiblePhotos.length;
                item.innerHTML = `
                    <img src="${getPhotoUrl(photo.id, 'thumb')}" alt="513Sips event photo" loading="lazy">
                    <div class="overlay">
                        <div class="overlay-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
                        </div>
                    </div>
                `;
                item.addEventListener('click', () => openLightbox(parseInt(item.dataset.index)));
                grid.appendChild(item);
                visiblePhotos.push(photo);
            });
            loadedCount += batch.length;
            updateCounter();
            loadMoreBtn.classList.toggle('hidden', loadedCount >= filteredPhotos.length);
        }

        function updateCounter() {
            const showing = Math.min(loadedCount, filteredPhotos.length);
            counter.textContent = `Showing ${showing} of ${filteredPhotos.length} photos`;
        }

        // Filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderPhotos();
            });
        });

        // Lightbox
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-content');
        const lightboxCounter = document.getElementById('lightbox-counter');

        function openLightbox(index) {
            currentLightboxIndex = index;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function updateLightbox() {
            lightboxImg.src = getPhotoUrl(visiblePhotos[currentLightboxIndex].id, 'full');
            lightboxCounter.textContent = `${currentLightboxIndex + 1} of ${visiblePhotos.length}`;
        }

        document.getElementById('lightbox-close').addEventListener('click', () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        });
        document.getElementById('lightbox-prev').addEventListener('click', () => {
            currentLightboxIndex = (currentLightboxIndex - 1 + visiblePhotos.length) % visiblePhotos.length;
            updateLightbox();
        });
        document.getElementById('lightbox-next').addEventListener('click', () => {
            currentLightboxIndex = (currentLightboxIndex + 1) % visiblePhotos.length;
            updateLightbox();
        });
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') { lightbox.classList.remove('active'); document.body.style.overflow = ''; }
            if (e.key === 'ArrowLeft') { currentLightboxIndex = (currentLightboxIndex - 1 + visiblePhotos.length) % visiblePhotos.length; updateLightbox(); }
            if (e.key === 'ArrowRight') { currentLightboxIndex = (currentLightboxIndex + 1) % visiblePhotos.length; updateLightbox(); }
        });
        lightbox.addEventListener('click', (e) => { if (e.target === lightbox) { lightbox.classList.remove('active'); document.body.style.overflow = ''; } });

        // Initial load
        renderPhotos();
    </script>
</body>
</html>
