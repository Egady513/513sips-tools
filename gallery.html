<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | 513Sips — Event Photos & Cocktail Portfolio</title>
    <meta name="description" content="Browse 513Sips event photos and cocktail portfolio — craft cocktails, bar setups, weddings, and private celebrations throughout Cincinnati.">
    <meta name="keywords" content="mobile bartender Cincinnati, craft cocktail catering, event bartending, dry-hire bartender Ohio">
    <link rel="canonical" href="https://www.513sips.com/gallery.html">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.513sips.com/gallery.html">
    <meta property="og:title" content="Gallery | 513Sips — Event Photos & Cocktail Portfolio">
    <meta property="og:description" content="Browse 513Sips event photos and cocktail portfolio — craft cocktails, bar setups, weddings, and private celebrations throughout Cincinnati.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --navy: #1a1a2e;
            --navy-light: #2d2d4a;
            --navy-dark: #12121f;
            --cream: #f5f2eb;
            --copper: #b87333;
            --copper-light: #d4915a;
            --charcoal: #2d3748;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--cream); color: var(--charcoal); overflow-x: hidden; line-height: 1.6; }

        /* ── Floating pill nav ── */
        .gallery-nav {
            position: fixed;
            top: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(245, 242, 235, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 9999px;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(184, 115, 51, 0.2);
            box-shadow: 0 8px 32px rgba(26, 26, 46, 0.15);
        }
        .gallery-nav-inner {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .gallery-nav-inner a {
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--charcoal);
            transition: color 0.3s ease;
        }
        .gallery-nav-inner a:hover { color: var(--copper); }
        .gallery-nav-inner .back-link {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--copper);
            font-weight: 600;
        }

        /* ── Page header ── */
        .gallery-header {
            padding: 8rem 2rem 2.5rem;
            text-align: center;
        }
        .gallery-header .tag {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-style: italic;
            color: var(--copper);
            margin-bottom: 0.5rem;
        }
        @keyframes shimmer { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        .gallery-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: inline-block;
            background: linear-gradient(90deg, var(--navy) 0%, var(--copper) 50%, var(--navy) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }
        .gallery-header p {
            font-size: 1rem;
            color: var(--charcoal);
            max-width: 500px;
            margin: 0 auto;
            opacity: 0.75;
        }

        /* ── Sticky tab bar ── */
        .tab-bar {
            position: sticky;
            top: 5rem;
            z-index: 900;
            background: rgba(245, 242, 235, 0.97);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(184, 115, 51, 0.25);
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex-shrink: 0;
            padding: 0.75rem 1.25rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--charcoal);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: color 0.25s ease, border-color 0.25s ease;
            white-space: nowrap;
        }
        .tab-btn:hover { color: var(--copper); }
        .tab-btn.active {
            color: var(--copper);
            border-bottom-color: var(--copper);
        }
        .tab-count {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-left: 0.25rem;
        }

        /* ── Main content wrapper ── */
        .gallery-main { max-width: 1400px; margin: 0 auto; padding: 0 2rem 4rem; }

        /* ── Section divider ── */
        .gallery-section { }
        .section-divider {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            padding: 3rem 0 1.25rem;
            border-bottom: 1px solid rgba(184, 115, 51, 0.2);
            margin-bottom: 1.25rem;
        }
        .gallery-section + .gallery-section .section-divider {
            padding-top: 2.5rem;
        }
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-style: italic;
            font-weight: 500;
            color: var(--navy);
        }
        .section-count {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            color: var(--copper-light);
            opacity: 0.7;
        }

        /* ── Grid layouts ── */
        /* Masonry (large & medium) */
        .section-grid.grid-large,
        .section-grid.grid-medium {
            columns: 3;
            column-gap: 0.75rem;
        }
        /* Fixed grid (small) */
        .section-grid.grid-small {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.75rem;
        }

        /* ── Photo items ── */
        .photo-item {
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        /* masonry items need break-inside + margin */
        .grid-large .photo-item,
        .grid-medium .photo-item {
            break-inside: avoid;
            margin-bottom: 0.75rem;
            display: block;
        }
        .photo-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(184, 115, 51, 0.2);
        }
        .photo-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }
        .photo-item:hover img { transform: scale(1.04); }
        .photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(26,26,46,0.55) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            padding: 1rem;
        }
        .photo-item:hover .photo-overlay { opacity: 1; }
        .overlay-icon {
            width: 34px;
            height: 34px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        /* ── Lightbox ── */
        .lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .lightbox.active { opacity: 1; pointer-events: all; }
        .lightbox-close {
            position: absolute;
            top: 2rem; right: 2rem;
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10000;
        }
        .lightbox-close:hover { background: var(--copper); transform: rotate(90deg); }
        .lightbox-content {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .lightbox-nav:hover { background: var(--copper); }
        .lightbox-prev { left: 2rem; }
        .lightbox-next { right: 2rem; }
        .lightbox-counter {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            font-family: 'Montserrat', sans-serif;
        }

        /* ── CTA bar ── */
        .cta-bar {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
            padding: 4rem 2rem;
            text-align: center;
        }
        .cta-bar h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 600;
            color: white;
            margin-bottom: 1rem;
        }
        .cta-bar p { color: rgba(255,255,255,0.8); max-width: 500px; margin: 0 auto 2rem; }
        .cta-bar .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2.5rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--copper), var(--copper-light));
            color: var(--navy-dark);
            transition: all 0.4s ease;
        }
        .cta-bar .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(184, 115, 51, 0.5); }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .gallery-nav { top: 1rem; padding: 0.6rem 1rem; }
            .gallery-nav-inner { gap: 0; }
            .gallery-nav-inner a:not(.back-link) { display: none; }
            .gallery-nav-inner .back-link { font-size: 0.82rem; gap: 0.3rem; }

            .tab-bar { top: 4rem; }

            .section-grid.grid-large,
            .section-grid.grid-medium {
                columns: 2;
            }
            .section-grid.grid-small {
                grid-template-columns: repeat(2, 1fr);
            }

            .gallery-main { padding: 0 1rem 3rem; }
            .section-divider { padding-top: 2rem; }
            .gallery-section + .gallery-section .section-divider { padding-top: 1.75rem; }
        }
        @media (max-width: 480px) {
            .section-grid.grid-large,
            .section-grid.grid-medium {
                columns: 2;
            }
        }
    </style>
</head>
<body>

    <div id="site-nav"></div>
    <script src="scripts/nav.js"></script>

    <!-- Page header -->
    <header class="gallery-header">
        <p class="tag">Our Work</p>
        <h1>Gallery</h1>
        <p>Every event, every craft, every celebration.</p>
    </header>

    <!-- Sticky section tab bar — populated dynamically from gallery-data.json -->
    <div class="tab-bar" id="tab-bar"></div>

    <!-- Gallery sections -->
    <main class="gallery-main" id="gallery-main">

        <!-- Sections generated dynamically from gallery-data.json -->

    </main>

    <!-- CTA -->
    <section class="cta-bar">
        <h2>Love What You See?</h2>
        <p>Let's create unforgettable moments at your next event.</p>
        <a href="index.html#contact" class="btn">Book Your Event</a>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <button class="lightbox-nav lightbox-next" id="lightbox-next">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <img class="lightbox-content" id="lightbox-img" src="" alt="513Sips Cincinnati event photo — enlarged view">
        <div class="lightbox-counter" id="lightbox-counter"></div>
    </div>

    <script>
        // ── Cloudinary URL helpers ────────────────────────────────────────────
        function thumbUrl(id) {
            return `https://res.cloudinary.com/dkfypt2cb/image/upload/c_fill,w_600,q_auto,f_webp/${id}.jpg`;
        }
        function fullUrl(id) {
            return `https://res.cloudinary.com/dkfypt2cb/image/upload/c_scale,w_1400,q_auto,f_webp/${id}.jpg`;
        }

        // ── Lightbox (set up once, independent of dynamic content) ───────────
        let allPhotos = [];
        let currentIndex = 0;
        const lightbox        = document.getElementById('lightbox');
        const lightboxImg     = document.getElementById('lightbox-img');
        const lightboxCounter = document.getElementById('lightbox-counter');

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function updateLightbox() {
            lightboxImg.src = fullUrl(allPhotos[currentIndex]);
            lightboxCounter.textContent = `${currentIndex + 1} of ${allPhotos.length}`;
        }
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox-prev').addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + allPhotos.length) % allPhotos.length;
            updateLightbox();
        });
        document.getElementById('lightbox-next').addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % allPhotos.length;
            updateLightbox();
        });
        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft')  { currentIndex = (currentIndex - 1 + allPhotos.length) % allPhotos.length; updateLightbox(); }
            if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % allPhotos.length; updateLightbox(); }
        });

        // ── Build a tab button ────────────────────────────────────────────────
        function buildTab(section, isFirst) {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (isFirst ? ' active' : '');
            btn.dataset.section = section.id;
            btn.innerHTML = `${section.label} <span class="tab-count">(${section.photos.length})</span>`;
            return btn;
        }

        // ── Build a gallery section ───────────────────────────────────────────
        function buildSection(section) {
            const count  = section.photos.length;
            const gClass = section.gridSize || (count >= 15 ? 'grid-large' : count >= 5 ? 'grid-medium' : 'grid-small');
            const sec    = document.createElement('section');
            sec.className = 'gallery-section';
            sec.id        = section.id;
            sec.innerHTML = `
                <div class="section-divider">
                    <h2 class="section-title">${section.label}</h2>
                    <span class="section-count">${count} photo${count !== 1 ? 's' : ''}</span>
                </div>
                <div class="section-grid ${gClass}" id="grid-${section.id}"></div>
            `;
            return sec;
        }

        // ── Populate a section grid with photo items ──────────────────────────
        function populateGrid(section) {
            const grid = document.getElementById('grid-' + section.id);
            if (!grid) return;
            section.photos.forEach(id => {
                const idx  = allPhotos.indexOf(id);
                const item = document.createElement('div');
                item.className    = 'photo-item';
                item.dataset.index = idx;
                item.innerHTML = `
                    <img src="${thumbUrl(id)}" alt="513Sips ${section.label} photo" loading="lazy">
                    <div class="photo-overlay">
                        <div class="overlay-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"/><path d="M9 21H3v-6"/><path d="M21 3l-7 7"/><path d="M3 21l7-7"/></svg>
                        </div>
                    </div>
                `;
                item.addEventListener('click', () => openLightbox(idx));
                grid.appendChild(item);
            });
        }

        // ── Wire up scroll spy + tab clicks after DOM is built ───────────────
        function initTabBehavior() {
            const tabButtons = document.querySelectorAll('.tab-btn');
            const sectionEls = document.querySelectorAll('.gallery-section');

            function setActiveTab(sectionId) {
                tabButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.section === sectionId));
                const active = document.querySelector(`.tab-btn[data-section="${sectionId}"]`);
                if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
            }

            // Set the first tab active immediately on load before the observer fires
            if (sectionEls.length > 0) {
                setActiveTab(sectionEls[0].id);
            }

            let observerReady = false;
            // Delay observer activation so it doesn't override the initial active state
            setTimeout(() => { observerReady = true; }, 400);

            const observer = new IntersectionObserver(entries => {
                if (!observerReady) return;
                entries.forEach(entry => { if (entry.isIntersecting) setActiveTab(entry.target.id); });
            }, { threshold: 0.2 });

            sectionEls.forEach(el => observer.observe(el));

            tabButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = document.getElementById(btn.dataset.section);
                    if (target) {
                        const top = target.getBoundingClientRect().top + window.scrollY - 140;
                        window.scrollTo({ top, behavior: 'smooth' });
                    }
                });
            });
        }

        // ── Load gallery-data.json and build everything ───────────────────────
        const tabBar     = document.getElementById('tab-bar');
        const galleryMain = document.getElementById('gallery-main');

        // Cache-bust so browsers always fetch the latest gallery-data.json
        const cacheBust = `?v=${Date.now()}`;

        function showGalleryError(msg) {
            galleryMain.innerHTML = `
                <div style="text-align:center;padding:4rem 2rem;color:var(--copper);font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-style:italic;opacity:0.75;">
                    ${msg}
                </div>`;
        }

        fetch('gallery-data.json' + cacheBust)
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                if (!data.sections || data.sections.length === 0) {
                    showGalleryError('Gallery coming soon — check back shortly.');
                    return;
                }

                allPhotos = data.sections.flatMap(s => s.photos);

                data.sections.forEach((section, i) => {
                    tabBar.appendChild(buildTab(section, i === 0));
                    galleryMain.appendChild(buildSection(section));
                });

                data.sections.forEach(populateGrid);
                initTabBehavior();
            })
            .catch(err => {
                console.error('[gallery] Failed to load gallery-data.json:', err);
                showGalleryError('Gallery temporarily unavailable — please try again in a moment.');
            });
    </script>
</body>
</html>
