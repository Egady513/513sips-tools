name: Sync Gallery from Cloudinary

on:
  # Triggered by Pipedream when Cloudinary fires a webhook
  repository_dispatch:
    types: [cloudinary-sync]
  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch gallery data from Cloudinary
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: node scripts/fetch-gallery.js

      - name: Check if gallery-data.json changed
        id: changes
        run: |
          if git diff --quiet gallery-data.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to gallery-data.json"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "gallery-data.json has changes — will commit"
          fi

      - name: Commit and push updated gallery-data.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery-data.json
          git commit -m "chore: sync gallery from Cloudinary [skip ci]"
          git push
